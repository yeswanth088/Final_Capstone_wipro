<!-- Page Header -->
<div class="container pt-5 my-4">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold m-0 text-dark" style="font-family: 'Inter', sans-serif;">Our Collection</h2>
  </div>

  <div class="row">
    <!-- Filters Sidebar -->
    <div class="col-lg-3 col-md-4 mb-4">
      <div class="pe-lg-4">
        <!-- Category Filter -->
        <h6 class="fw-bold mb-3 text-dark">Category</h6>
        <ul class="list-unstyled d-flex flex-column gap-1 mb-5">
          <li>
            <a (click)="selectCategory('All')" href="javascript:void(0)" 
               class="d-block py-2 px-3 rounded text-decoration-none fw-medium transition-all" 
               [class.bg-primary]="selectedCategory === 'All'" 
               [class.text-white]="selectedCategory === 'All'" 
               [class.text-secondary]="selectedCategory !== 'All'" 
               [class.hover-bg-light]="selectedCategory !== 'All'">All</a>
          </li>
          <li *ngFor="let cat of categories">
            <a (click)="selectCategory(cat.categoryName)" href="javascript:void(0)" 
               class="d-block py-2 px-3 rounded text-decoration-none fw-medium transition-all" 
               [class.bg-primary]="selectedCategory === cat.categoryName" 
               [class.text-white]="selectedCategory === cat.categoryName" 
               [class.text-secondary]="selectedCategory !== cat.categoryName" 
               [class.hover-bg-light]="selectedCategory !== cat.categoryName">{{cat.categoryName}}</a>
          </li>
        </ul>

        <!-- Price Filter -->
        <h6 class="fw-bold mb-3 text-dark">Price</h6>
        <ul class="list-unstyled d-flex flex-column gap-1">
          <li><a (click)="selectPriceRange('All Prices')" href="javascript:void(0)" class="d-block py-2 px-3 rounded text-decoration-none fw-medium transition-all" [class.bg-primary]="selectedPriceRange === 'All Prices'" [class.text-white]="selectedPriceRange === 'All Prices'" [class.text-secondary]="selectedPriceRange !== 'All Prices'" [class.hover-bg-light]="selectedPriceRange !== 'All Prices'">All Prices</a></li>
          <li><a (click)="selectPriceRange('Under ₹50')" href="javascript:void(0)" class="d-block py-2 px-3 rounded text-decoration-none fw-medium transition-all" [class.bg-primary]="selectedPriceRange === 'Under ₹50'" [class.text-white]="selectedPriceRange === 'Under ₹50'" [class.text-secondary]="selectedPriceRange !== 'Under ₹50'" [class.hover-bg-light]="selectedPriceRange !== 'Under ₹50'">Under ₹50</a></li>
          <li><a (click)="selectPriceRange('₹50 – ₹100')" href="javascript:void(0)" class="d-block py-2 px-3 rounded text-decoration-none fw-medium transition-all" [class.bg-primary]="selectedPriceRange === '₹50 – ₹100'" [class.text-white]="selectedPriceRange === '₹50 – ₹100'" [class.text-secondary]="selectedPriceRange !== '₹50 – ₹100'" [class.hover-bg-light]="selectedPriceRange !== '₹50 – ₹100'">₹50 &ndash; ₹100</a></li>
          <li><a (click)="selectPriceRange('₹100+')" href="javascript:void(0)" class="d-block py-2 px-3 rounded text-decoration-none fw-medium transition-all" [class.bg-primary]="selectedPriceRange === '₹100+'" [class.text-white]="selectedPriceRange === '₹100+'" [class.text-secondary]="selectedPriceRange !== '₹100+'" [class.hover-bg-light]="selectedPriceRange !== '₹100+'">₹100+</a></li>
        </ul>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="col-lg-9 col-md-8">
      <div class="row g-4 mb-5">
        <div class="col-lg-4 col-sm-6" *ngFor="let p of filteredProducts">
          <div class="card product-card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
            
            <div class="product-img-wrapper position-relative overflow-hidden bg-light" style="padding: 1.5rem; aspect-ratio: 1/1;">
              <img [src]="p.imageUrl || 'assets/noimage.png'" 
                   class="card-img-top product-img w-100 h-100 object-fit-contain mix-blend-multiply transition-transform" 
                   alt="{{p.productName}}">
                   
              <button class="wishlist-btn position-absolute top-0 end-0 m-3 btn rounded-circle shadow-sm transition-all"
                      [ngClass]="isInWishlist(p) ? 'btn-danger' : 'btn-light text-muted'"
                      (click)="toggleWishlist(p)" title="Wishlist">
                <i class="bi bi-heart-fill text-white" *ngIf="isInWishlist(p)"></i>
                <i class="bi bi-heart" *ngIf="!isInWishlist(p)"></i>
              </button>
            </div>
            
            <div class="card-body p-3 pt-4 d-flex flex-column bg-white">
              <h6 class="product-name mb-1 text-truncate fw-bold text-dark" title="{{p.productName}}">{{p.productName}}</h6>
              <div class="d-flex align-items-center mb-3 text-muted small">
                <i class="bi bi-star-fill text-warning me-1"></i>
                <span class="fw-medium">{{p.rating || '4.8'}}</span>
              </div>
              
              <div class="mt-auto d-flex justify-content-between align-items-center">
                <h6 class="product-price m-0 fw-bold text-dark mb-0">₹{{p.price}}</h6>
                <button class="btn btn-primary rounded-pill btn-sm px-3 py-1 fw-medium shadow-sm transition-all text-white" 
                        (click)="addToCart(p)">
                  Add to Cart
                </button>
              </div>
            </div>
            
          </div>
        </div>
      </div>
      
      <!-- Empty State -->
      <div *ngIf="products.length === 0" class="text-center py-5 my-5">
        <h4 class="text-muted fw-bold">No products found</h4>
        <p class="text-muted">Try adjusting your filters.</p>
      </div>
    </div>
  </div>
</div>
