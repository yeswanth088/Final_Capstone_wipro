<div class="d-flex min-vh-100 bg-light">
  
  <!-- Sidebar -->
  <div class="admin-sidebar text-white p-4 d-flex flex-column shadow-sm" style="width: 250px; background-color: var(--accent-color); flex-shrink: 0; min-height: calc(100vh - 80px);">
    <h5 class="fw-bold mb-5" style="color: var(--primary-color);">Admin Panel</h5>
    
    <ul class="nav flex-column gap-2 mb-0">
      <li class="nav-item">
        <a routerLink="/admin/products" routerLinkActive="active" class="nav-link text-white-50 d-flex align-items-center gap-3 py-2 px-3 rounded-2 transition-all admin-link">
          <i class="bi bi-box-seam fs-6"></i>
          <span class="fw-medium">Products</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/users" routerLinkActive="active" class="nav-link text-white-50 d-flex align-items-center gap-3 py-2 px-3 rounded-2 transition-all admin-link">
          <i class="bi bi-people fs-6"></i>
          <span class="fw-medium">Users</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/upload" routerLinkActive="active" class="nav-link text-white-50 d-flex align-items-center gap-3 py-2 px-3 rounded-2 transition-all admin-link">
          <i class="bi bi-upload fs-6"></i>
          <span class="fw-medium">Bulk Upload</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/sales-report" routerLinkActive="active" class="nav-link text-white-50 d-flex align-items-center gap-3 py-2 px-3 rounded-2 transition-all admin-link">
          <i class="bi bi-bar-chart fs-6"></i>
          <span class="fw-medium">Sales Report</span>
        </a>
      </li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="flex-grow-1 p-5 overflow-auto">
    <!-- Header -->
    <div class="mb-5">
      <h3 class="fw-bold m-0 text-dark">Sales Report</h3>
    </div>

    <!-- Filter Card -->
    <div class="d-flex align-items-center gap-3 mb-5 p-4 bg-white rounded-4 shadow-sm border overflow-hidden">
      <div class="d-flex flex-column gap-2">
        <label class="small fw-bold text-dark ms-1">Start Date</label>
        <div class="d-flex align-items-center bg-light rounded-3 px-3 py-2 border">
          <input type="date" class="form-control border-0 bg-transparent text-secondary p-0" [(ngModel)]="startDate" style="width: 130px; box-shadow: none;">
        </div>
      </div>
      
      <div class="d-flex flex-column gap-2">
        <label class="small fw-bold text-dark ms-1">End Date</label>
        <div class="d-flex align-items-center bg-light rounded-3 px-3 py-2 border">
          <input type="date" class="form-control border-0 bg-transparent text-secondary p-0" [(ngModel)]="endDate" style="width: 130px; box-shadow: none;">
        </div>
      </div>

      <div class="d-flex align-items-end h-100 mt-4">
        <button class="btn btn-primary rounded-3 px-4 py-2 fw-medium text-white shadow-sm" (click)="generateReport()" [disabled]="!startDate || !endDate || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          Generate Report
        </button>
      </div>
    </div>

    <!-- Results Section -->
    <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden" *ngIf="hasSearched">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 border-0">
            <thead class="bg-white">
              <tr>
                <th class="ps-4 py-4 border-bottom text-dark fw-bold border-0">Date</th>
                <th class="py-4 border-bottom text-dark fw-bold border-0">Product</th>
                <th class="py-4 border-bottom text-dark fw-bold border-0">Qty</th>
                <th class="text-end pe-4 py-4 border-bottom text-dark fw-bold border-0">Revenue</th>
              </tr>
            </thead>
            <tbody class="border-top-0">
              <tr *ngIf="reportData.length === 0 && !isLoading">
                <td colspan="4" class="text-center py-5 text-muted">
                  No sales found for the selected date range.
                </td>
              </tr>
              <tr *ngFor="let item of reportData">
                <td class="ps-4 py-4 text-secondary">{{item.date | date:'yyyy-MM-dd'}}</td>
                <td class="py-4 fw-medium text-secondary">{{item.product}}</td>
                <td class="py-4 text-secondary">{{item.qty}}</td>
                <td class="text-end pe-4 py-4 fw-bold text-dark">₹{{item.revenue | number:'1.0-0'}}</td>
              </tr>
            </tbody>
            <tfoot class="border-top" *ngIf="reportData.length > 0">
              <tr>
                <td colspan="3" class="ps-4 py-4 fw-bold text-dark">Total</td>
                <td class="text-end pe-4 py-4 fw-bold text-dark fs-5">₹{{totalRevenue | number:'1.0-0'}}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
