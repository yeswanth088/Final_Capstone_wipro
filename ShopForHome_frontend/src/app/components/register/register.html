<div class="register-container d-flex justify-content-center align-items-center" style="min-height: 95vh; background-color: #fafafa; padding: 30px;">
  <div class="card border-0" style="border-radius: 20px; width: 100%; max-width: 460px; padding: 56px 48px; background: #ffffff; box-shadow: 0 10px 40px rgba(0,0,0,0.04);">
    
    <div class="text-center mb-5">
      <h2 class="fw-bold text-dark mb-2" style="font-size: 1.85rem; letter-spacing: -0.02em;">Create Account</h2>
      <p class="text-secondary mb-0" style="font-size: 0.95rem;">Join our community</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger py-3 px-4 small rounded-3 mb-4 d-flex align-items-center border-0 shadow-sm" style="background-color: #fef2f2; color: #991b1b;">
      <i class="bi bi-exclamation-circle-fill me-2 fs-5"></i> {{ errorMessage }}
    </div>

    <div class="mb-3 text-start">
      <label for="nameInput" class="form-label small fw-bold text-dark mb-2" style="font-size: 0.85rem;">Full Name</label>
      <input type="text" class="form-control" id="nameInput" placeholder="" [(ngModel)]="user.name" 
             style="border-radius: 12px; border: 1px solid #f1f1f1; padding: 14px 20px; font-size: 0.95rem; background: #f9f9f9; box-shadow: none;">
    </div>

    <div class="mb-3 text-start">
      <label for="emailInput" class="form-label small fw-bold text-dark mb-2" style="font-size: 0.85rem;">Email</label>
      <input type="email" class="form-control" id="emailInput" placeholder="" [(ngModel)]="user.email" 
             style="border-radius: 12px; border: 1px solid #f1f1f1; padding: 14px 20px; font-size: 0.95rem; background: #f9f9f9; box-shadow: none;">
    </div>

    <div class="mb-5 text-start">
      <label for="passwordInput" class="form-label small fw-bold text-dark mb-2" style="font-size: 0.85rem;">Password</label>
      <input type="password" class="form-control" id="passwordInput" placeholder="" [(ngModel)]="user.password" 
             style="border-radius: 12px; border: 1px solid #f1f1f1; padding: 14px 20px; font-size: 0.95rem; background: #f9f9f9; box-shadow: none;">
      <div class="mt-2" style="font-size: 0.75rem; color: #6b7280;">
        <i class="bi bi-info-circle me-1"></i> Use 8+ characters with uppercase, numbers, and symbols (e.g. Yeswanth@123)
      </div>
    </div>

    <button class="btn btn-primary w-100 py-3 fw-bold mb-4 d-flex justify-content-center align-items-center text-white" 
            style="border-radius: 12px; font-size: 1rem; border: none;"
            (click)='onRegister()' 
            [disabled]="isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
    </button>
    
    <div class="text-center mt-2">
      <p class="text-secondary" style="font-size: 0.9rem;">
        Already have an account? <a routerLink="/login" class="text-decoration-none fw-medium" style="color: var(--primary-color);">Sign In</a>
      </p>
    </div>
    
  </div>
</div>

<!-- Toast Notification -->
<div class="position-fixed bottom-0 end-0 p-4" style="z-index: 1100">
  <div class="toast align-items-center bg-dark border-0 shadow-lg text-white" [class.show]="showToast" role="alert" aria-live="assertive" aria-atomic="true" style="border-radius: 12px; min-width: 300px;">
    <div class="d-flex p-3">
      <div class="toast-body d-flex align-items-center gap-3 p-0 w-100 fw-medium">
        <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 28px; height: 28px;">
          <i class="bi bi-check-lg" style="font-size: 18px;"></i>
        </div>
        Account created! Redirecting to login...
      </div>
    </div>
  </div>
</div>
